<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Career Dispatch</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;1,600&family=JetBrains+Mono:wght@400;600&family=Inter+Tight:wght@400;500;600&display=swap');

  :root {
    --ink: #0a0a0a;
    --paper: #f5f1e8;
    --paper-deep: #ebe5d3;
    --paper-line: #d8d1bd;
    --accent: #d63f1f;
    --gold: #c4962b;
    --forest: #1f3d2e;
    --mist: #8a8275;
    --cream: #faf7ef;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter Tight', sans-serif;
    background: var(--paper);
    color: var(--ink);
    width: 360px;
    min-height: 400px;
    font-size: 13px;
  }

  .header {
    background: var(--cream);
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--ink);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .logo {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 700;
    font-style: italic;
    letter-spacing: -0.02em;
  }

  .logo .asterisk { color: var(--accent); font-style: normal; }

  .version {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--mist);
    text-transform: uppercase;
  }

  .content { padding: 16px 20px; }

  .section {
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--paper-line);
  }
  .section:last-child { border-bottom: none; margin-bottom: 0; }

  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--mist);
    margin-bottom: 10px;
    font-weight: 600;
  }

  .btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 10px 14px;
    border: 1px solid var(--ink);
    background: var(--ink);
    color: var(--cream);
    cursor: pointer;
    font-weight: 600;
    width: 100%;
    transition: all 0.15s ease;
  }

  .btn:hover:not(:disabled) {
    background: var(--accent);
    border-color: var(--accent);
  }

  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .btn-secondary {
    background: transparent;
    color: var(--ink);
  }

  .btn-secondary:hover:not(:disabled) {
    background: var(--ink);
    color: var(--cream);
  }

  .btn-sm { padding: 6px 10px; font-size: 9px; }

  .status {
    background: var(--cream);
    border: 1px solid var(--paper-line);
    padding: 10px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    margin-bottom: 12px;
  }

  .status.loaded {
    border-color: var(--forest);
    background: #f0f5f1;
  }

  .status.empty {
    border-color: var(--accent);
    background: #fcf0ed;
  }

  .status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 8px;
    vertical-align: middle;
  }

  .status.loaded .status-dot { background: var(--forest); }
  .status.empty .status-dot { background: var(--accent); }

  input[type=file] { display: none; }

  .shortcut {
    font-family: 'JetBrains Mono', monospace;
    background: var(--paper-deep);
    padding: 2px 6px;
    border: 1px solid var(--paper-line);
    font-size: 10px;
  }

  .field-list {
    display: grid;
    gap: 4px;
    max-height: 180px;
    overflow-y: auto;
    padding: 2px;
  }

  .field-btn {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    background: var(--cream);
    border: 1px solid var(--paper-line);
    cursor: pointer;
    font-family: 'Inter Tight', sans-serif;
    font-size: 12px;
    text-align: left;
    transition: all 0.15s ease;
  }

  .field-btn:hover {
    background: var(--paper-deep);
    border-color: var(--ink);
  }

  .field-btn .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--mist);
  }

  .field-btn .value {
    font-size: 11px;
    color: var(--ink);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 160px;
  }

  .footer {
    padding: 10px 20px;
    background: var(--cream);
    border-top: 1px solid var(--paper-line);
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--mist);
    text-align: center;
    text-transform: uppercase;
  }

  .toast-mini {
    position: fixed;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: var(--cream);
    padding: 8px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: 1px solid var(--accent);
    z-index: 1000;
  }

  .tip {
    font-size: 11px;
    color: var(--mist);
    line-height: 1.5;
    margin-top: 8px;
  }
</style>
</head>
<body>
  <div class="header">
    <div class="logo">Career<span class="asterisk">*</span>Dispatch</div>
    <div class="version">v1.0</div>
  </div>

  <div class="content">
    <div id="status-bar" class="status">
      <span class="status-dot"></span>
      <span id="status-text">Checking profile…</span>
    </div>

    <!-- PROFILE SECTION -->
    <div class="section">
      <div class="section-label">◉ Profile</div>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px;">
        <button class="btn btn-sm" id="btn-import">⬆ Import</button>
        <button class="btn btn-secondary btn-sm" id="btn-clear">✕ Clear</button>
      </div>
      <input type="file" id="file-input" accept=".json">
      <p class="tip">Import the <code>profile.json</code> exported from your Career Dispatch tool.</p>
    </div>

    <!-- AUTOFILL SECTION -->
    <div class="section">
      <div class="section-label">◉ Autofill</div>
      <button class="btn" id="btn-autofill">⚡ Autofill This Page</button>
      <p class="tip">Or press <span class="shortcut" id="shortcut-display">⌘⇧F</span> on any application page.</p>
    </div>

    <!-- MANUAL PICKER -->
    <div class="section" id="picker-section">
      <div class="section-label">◉ Manual — Fill Single Field</div>
      <p class="tip" style="margin-bottom: 10px;">Click a field below, then click the target field on the page.</p>
      <div class="field-list" id="field-list"></div>
    </div>
  </div>

  <div class="footer">US JOB AUTOFILL · LOCAL ONLY</div>

<script src="popup.js"></script>
</body>
</html>
